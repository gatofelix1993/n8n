name: Hashtags en comentario MICELIO VITAL

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC ≈ 14:00 Chile (separado de la publicacion)
  workflow_dispatch:

jobs:
  comentar:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar n8n y disparar los hashtags
        run: |
          BASE="https://n8n-1-1m5y.onrender.com"
          HOOK="${{ secrets.N8N_HASHTAGS_URL }}"
          echo "Despertando n8n..."
          curl -s -o /dev/null --max-time 90 "$BASE/healthz" || true
          sleep 60
          echo "Disparando el flujo de hashtags..."
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$HOOK")
          echo "Webhook respondio: HTTP $code"
          if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then echo "OK"; else echo "Fallo"; exit 1; fi
