name: Hashtags en comentario MICELIO VITAL

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  comentar:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar n8n (con reintentos) y disparar los hashtags
        run: |
          BASE="https://n8n-1-1m5y.onrender.com"
          HOOK="${{ secrets.N8N_HASHTAGS_URL }}"
          echo "Despertando n8n..."
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE/healthz" || echo 000)
            echo "Intento $i: healthz HTTP $code"
            if [ "$code" = "200" ]; then echo "n8n despierto"; break; fi
            sleep 15
          done
          sleep 5
          echo "Disparando el flujo de hashtags..."
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$HOOK")
          echo "Webhook respondio: HTTP $code"
          if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then echo "OK"; else echo "Fallo"; exit 1; fi
